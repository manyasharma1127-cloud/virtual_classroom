<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Classroom – Teacher</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { color: #4fc3f7; font-size: 1.5rem; }
    .stats {
      display: flex;
      gap: 16px;
    }
    .stat {
      background: #1e2130;
      border-radius: 10px;
      padding: 10px 20px;
      text-align: center;
    }
    .stat .num { font-size: 1.6rem; font-weight: bold; }
    .stat .lbl { font-size: 0.75rem; color: #888; }
    .stat.green .num { color: #69f0ae; }
    .stat.red .num { color: #ff8a80; }
    .stat.blue .num { color: #4fc3f7; }

    #empty-msg {
      color: #555;
      text-align: center;
      margin-top: 80px;
      font-size: 1rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .student-card {
      background: #1e2130;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #2a2d3e;
      transition: border-color 0.3s;
    }
    .student-card.attentive { border-color: #2e7d32; }
    .student-card.not-attentive { border-color: #c62828; }

    .student-card img {
      width: 100%;
      display: block;
      background: #000;
      min-height: 180px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
    }
    .student-name { font-size: 0.95rem; font-weight: 600; }
    .badge {
      font-size: 0.75rem;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge.yes { background: #1b5e20; color: #69f0ae; }
    .badge.no  { background: #b71c1c; color: #ff8a80; }
  </style>
</head>
<body>

  <header>
    <h1>👩‍🏫 Teacher Dashboard</h1>
    <div class="stats">
      <div class="stat blue">
        <div class="num" id="total">0</div>
        <div class="lbl">Students</div>
      </div>
      <div class="stat green">
        <div class="num" id="attentive-count">0</div>
        <div class="lbl">Attentive</div>
      </div>
      <div class="stat red">
        <div class="num" id="not-attentive-count">0</div>
        <div class="lbl">Not Attentive</div>
      </div>
    </div>
  </header>

  <p id="empty-msg">Waiting for students to join...</p>
  <div id="grid"></div>

  <script>
    const socket = io();

    // sid -> { name, attentive }
    const students = {};

    function updateStats() {
      const total = Object.keys(students).length;
      const att = Object.values(students).filter(s => s.attentive).length;
      document.getElementById('total').textContent = total;
      document.getElementById('attentive-count').textContent = att;
      document.getElementById('not-attentive-count').textContent = total - att;
      document.getElementById('empty-msg').style.display = total === 0 ? 'block' : 'none';
    }

    function getOrCreateCard(sid, name) {
      let card = document.getElementById(`card-${sid}`);
      if (!card) {
        card = document.createElement('div');
        card.className = 'student-card';
        card.id = `card-${sid}`;
        card.innerHTML = `
          <img id="img-${sid}" src="" alt="${name}" />
          <div class="card-footer">
            <span class="student-name">👤 ${name}</span>
            <span class="badge" id="badge-${sid}">...</span>
          </div>`;
        document.getElementById('grid').appendChild(card);
      }
      return card;
    }

    socket.on('student_joined', (data) => {
      students[data.sid] = { name: data.name, attentive: false };
      getOrCreateCard(data.sid, data.name);
      updateStats();
    });

    socket.on('student_left', (data) => {
      delete students[data.sid];
      const card = document.getElementById(`card-${data.sid}`);
      if (card) card.remove();
      updateStats();
    });

    socket.on('student_frame', (data) => {
      const { sid, name, frame, attentive } = data;

      if (!students[sid]) {
        students[sid] = { name, attentive };
        getOrCreateCard(sid, name);
      } else {
        students[sid].attentive = attentive;
      }

      // Update frame
      const img = document.getElementById(`img-${sid}`);
      if (img) img.src = frame;

      // Update badge & card border
      const badge = document.getElementById(`badge-${sid}`);
      const card = document.getElementById(`card-${sid}`);
      if (badge && card) {
        if (attentive) {
          badge.textContent = '✅ Attentive';
          badge.className = 'badge yes';
          card.className = 'student-card attentive';
        } else {
          badge.textContent = '⚠️ Not Attentive';
          badge.className = 'badge no';
          card.className = 'student-card not-attentive';
        }
      }

      updateStats();
    });
  </script>
</body>
</html>
