<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Classroom – Student</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { color: #4fc3f7; margin-bottom: 8px; font-size: 1.6rem; }
    p.sub { color: #888; margin-bottom: 24px; font-size: 0.9rem; }

    #join-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }
    input {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e2130;
      color: white;
      font-size: 1rem;
    }
    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #4fc3f7;
      color: #0f1117;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #81d4fa; }

    #classroom {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 560px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      border: 2px solid #333;
      background: #000;
    }

    #status {
      font-size: 0.95rem;
      padding: 8px 16px;
      border-radius: 20px;
      background: #1e2130;
    }
    #status.attentive { background: #1b5e20; color: #69f0ae; }
    #status.not-attentive { background: #b71c1c; color: #ff8a80; }

    #info { color: #aaa; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>

  <h1>🎓 EduVision Ai</h1>
  <p class="sub">Student Portal</p>

  <div id="join-form">
    <input type="text" id="name-input" placeholder="Enter your name" />
    <button onclick="joinClass()">Join Class</button>
  </div>

  <div id="classroom">
    <div id="teacher-speaking" style="display:none; background:#1b5e20; color:#69f0ae; padding:8px 16px; border-radius:20px; font-size:0.85rem;">
  🎤 Teacher is speaking...
</div>

    <!-- Whiteboard -->
    <div style="width:100%; max-width:560px; margin-bottom:16px;">
      <h3 style="color:#4fc3f7; margin-bottom:8px;">🖊️ Teacher's Whiteboard</h3>
      <canvas id="wb-student" style="background:white; border-radius:10px; width:100%; height:220px; display:block;"></canvas>
    </div>

    <!-- Camera -->
    <video id="local-video" autoplay muted playsinline></video>
    <div id="status">Connecting...</div>
    <p id="info">Your camera is being shared with the teacher.</p>
    <button onclick="leaveClass()" style="background:#ef5350; color:white; margin-top:8px;">Leave Class</button>

  </div>

  <script>
    const socket = io();
    let stream = null;
    let frameInterval = null;
    let studentName = '';

    // ── Whiteboard ────────────────────────────────────────────────────────────
    const wbCanvas = document.getElementById('wb-student');
    const wbCtx = wbCanvas.getContext('2d');
    wbCanvas.width = wbCanvas.offsetWidth || 560;
    wbCanvas.height = 220;

    socket.on('wb_stroke', (d) => {
      const scaleX = wbCanvas.width / d.cw;
      const scaleY = wbCanvas.height / d.ch;
      wbCtx.beginPath();
      wbCtx.moveTo(d.x1 * scaleX, d.y1 * scaleY);
      wbCtx.lineTo(d.x2 * scaleX, d.y2 * scaleY);
      if (d.tool === 'eraser') {
        wbCtx.globalCompositeOperation = 'destination-out';
        wbCtx.lineWidth = d.size * 3;
        wbCtx.strokeStyle = 'rgba(0,0,0,1)';
        wbCtx.globalAlpha = 1;
      } else if (d.tool === 'marker') {
        wbCtx.globalCompositeOperation = 'source-over';
        wbCtx.globalAlpha = 0.4;
        wbCtx.lineWidth = d.size * 3;
        wbCtx.strokeStyle = d.color;
      } else {
        wbCtx.globalCompositeOperation = 'source-over';
        wbCtx.globalAlpha = 1;
        wbCtx.lineWidth = d.size;
        wbCtx.strokeStyle = d.color;
      }
      wbCtx.lineCap = 'round';
      wbCtx.lineJoin = 'round';
      wbCtx.stroke();
      wbCtx.globalAlpha = 1;
      wbCtx.globalCompositeOperation = 'source-over';
    });

    socket.on('wb_clear', () => {
      wbCtx.clearRect(0, 0, wbCanvas.width, wbCanvas.height);
    });

    socket.on('teacher_audio', (data) => {
  document.getElementById('teacher-speaking').style.display = 'block';
  // ... rest of audio code above
});

socket.on('teacher_mic_stop', () => {
  document.getElementById('teacher-speaking').style.display = 'none';
});

    socket.on('class_ended', () => {
  if (frameInterval) clearInterval(frameInterval);
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('classroom').style.display = 'none';
  document.getElementById('join-form').style.display = 'flex';
  alert('The teacher has ended the class.');
});

    // ── Join Class ────────────────────────────────────────────────────────────
    async function joinClass() {
      studentName = document.getElementById('name-input').value.trim();
      if (!studentName) { alert('Please enter your name.'); return; }

      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('local-video').srcObject = stream;
      } catch (e) {
        alert('Camera access denied. Please allow camera permissions.');
        return;
      }

      socket.emit('student_join', { name: studentName });

      document.getElementById('join-form').style.display = 'none';
      document.getElementById('classroom').style.display = 'flex';

      // Send frames every 200ms
      const canvas = document.createElement('canvas');
      const video = document.getElementById('local-video');
      canvas.width = 320;
      canvas.height = 240;
      const ctx = canvas.getContext('2d');

      frameInterval = setInterval(() => {
        ctx.drawImage(video, 0, 0, 320, 240);
        const frame = canvas.toDataURL('image/jpeg', 0.6);
        socket.emit('frame', { frame });
      }, 200);
    }

    // ── Leave Class ───────────────────────────────────────────────────────────
    function leaveClass() {
      if (frameInterval) clearInterval(frameInterval);
      if (stream) stream.getTracks().forEach(t => t.stop());
      socket.disconnect();
      document.getElementById('classroom').style.display = 'none';
      document.getElementById('join-form').style.display = 'flex';
    }
    

    // ── Force Disconnect (kicked) ─────────────────────────────────────────────
    socket.on('force_disconnect', () => {
      alert("You were removed by the teacher");
      socket.disconnect();
      window.location.href = "/";
    });

    let studentAudioContext = null;

socket.on('teacher_audio', (data) => {
  try {
    if (!studentAudioContext) {
      studentAudioContext = new AudioContext({ sampleRate: 16000 });
    }
    // Decode base64 to int16
    const binary = atob(data.audio);
    const int16 = new Int16Array(binary.length / 2);
    for (let i = 0; i < int16.length; i++) {
      int16[i] = binary.charCodeAt(i * 2) | (binary.charCodeAt(i * 2 + 1) << 8);
    }
    // Convert int16 to float32
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768;
    }
    // Create audio buffer and play
    const buffer = studentAudioContext.createBuffer(1, float32.length, 16000);
    buffer.copyToChannel(float32, 0);
    const source = studentAudioContext.createBufferSource();
    source.buffer = buffer;
    source.connect(studentAudioContext.destination);
    source.start();
  } catch (e) {
    console.error('Audio playback error:', e);
  }
});

socket.on('teacher_mic_stop', () => {
  // Nothing needed — audio just stops coming
});

    // ── Attention Status ──────────────────────────────────────────────────────
    socket.on('student_frame', (data) => {
      const statusEl = document.getElementById('status');
      if (data.name === studentName) {
        if (data.attentive) {
          statusEl.textContent = '✅ You look attentive!';
          statusEl.className = 'attentive';
        } else {
          statusEl.textContent = '⚠️ Face not detected — look at the screen!';
          statusEl.className = 'not-attentive';
        }
      }
    });
  </script>
</body>
</html>
